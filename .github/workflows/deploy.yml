name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject credentials into index.html
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python3 - <<'EOF'
          import os, pathlib
          html = pathlib.Path('index.html').read_text()
          html = html.replace('PLACEHOLDER_SUPABASE_URL', os.environ['SUPABASE_URL'])
          html = html.replace('PLACEHOLDER_SUPABASE_ANON_KEY', os.environ['SUPABASE_ANON_KEY'])
          pathlib.Path('index.html').write_text(html)
          print('Injected OK, URL starts with:', os.environ['SUPABASE_URL'][:20])
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
